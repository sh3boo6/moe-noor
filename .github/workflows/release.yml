name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-nuxt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@11.5.2 --activate

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build Nuxt app
        run: pnpm build
        env:
          TAURI_APP: true

      - name: Upload Nuxt Build Assets
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-dist
          path: dist

  build-linux:
    runs-on: ubuntu-latest
    needs: build-nuxt
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@11.5.2 --activate

      - name: Download Nuxt Build Assets
        uses: actions/download-artifact@v4
        with:
          name: nuxt-dist
          path: dist

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            fakeroot \
            patchelf \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-unknown-linux-gnu
          components: rust-src

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build Tauri Linux
        run: pnpm tauri build
        env:
          TAURI_APP: true

      # رفع ملفات لينكس النهائية فقط وتجاهل ملفات النظام الداخلية
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.tar.gz

  build-windows:
    runs-on: windows-latest
    needs: build-nuxt
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@11.5.2 --activate

      - name: Download Nuxt Build Assets
        uses: actions/download-artifact@v4
        with:
          name: nuxt-dist
          path: dist

      - name: Install NSIS and WiX
        run: choco install nsis wixtoolset

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build Tauri Windows
        run: pnpm tauri build
        env:
          TAURI_APP: true

      # رفع ملفات ويندوز النهائية فقط (.exe و .msi)
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi

  build-macos:
    runs-on: macos-latest
    needs: build-nuxt
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@11.5.2 --activate

      - name: Download Nuxt Build Assets
        uses: actions/download-artifact@v4
        with:
          name: nuxt-dist
          path: dist

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build Tauri macOS
        run: pnpm tauri build
        env:
          TAURI_APP: true

      # رفع ملفات ماك النهائية فقط (.dmg و .app داخل zip)
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # خطوة التصفية النهائية والرفع النظيف للـ Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
